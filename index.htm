<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel STE — Yvy Poty</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        /* ═══════════════════════════════════════════
           SISTEMA DE TOKENS E TEMA
           ═══════════════════════════════════════════ */
        :root {
            --accent: #3b82f6; --accent-deep: #1d4ed8; --accent-glow: rgba(59,130,246,0.25);
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --primary: #1a73e8;
            --bg-root: #f0f4ff; --bg-shell: #ffffff; --bg-sidebar: #fafbff; --bg-card: #f5f7ff;
            --bg-input: #eef1fb; --text-primary: #0f172a; --text-secondary: #475569;
            --text-muted: #94a3b8; --border: rgba(148,163,184,0.25);
            --shadow-dark: rgba(0,0,0,0.15); --nav-bg: rgba(255,255,255,0.95);
        }

        [data-theme="dark"] {
            --bg-root: #080c14; --bg-shell: #0e1422; --bg-sidebar: #0b1020; --bg-card: #131a2e;
            --bg-input: #0f1525; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-muted: #475569; --border: rgba(59,130,246,0.12);
            --shadow-dark: rgba(0,0,0,0.55); --nav-bg: rgba(13,19,35,0.95);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif; background: var(--bg-root);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; overflow-y: auto; color: var(--text-primary); transition: background 0.5s ease;
        }

        /* ═══════════════════════════════════════════
           TELA DE LOGIN (NEON CORRIGIDO)
           ═══════════════════════════════════════════ */
        #section-login {
            position: relative; width: 90%; max-width: 380px; padding: 4px;
            background: #111; border-radius: 24px; overflow: hidden; display: flex; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 1000;
        }
        #section-login::before {
            content: ""; position: absolute; inset: -50%;
            background: conic-gradient(from 0deg, var(--accent), var(--success), var(--accent));
            animation: spin 4s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .login-box { position: relative; z-index: 1; width: 100%; background: var(--bg-shell); border-radius: 20px; padding: 40px 30px; text-align: center; }
        .logo-login { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--border); margin-bottom: 20px; object-fit: cover; }
        .login-box h2 { font-family: 'Syne', sans-serif; margin-bottom: 20px; color: var(--text-primary); }
        .input-modern { width: 100%; height: 48px; padding: 0 15px; background: var(--bg-input); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text-primary); font-weight: 500; outline: none; margin-bottom: 12px;}
        .input-modern:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
        .btn-neon { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), var(--success)); color: white; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }

        /* ═══════════════════════════════════════════
           ESTRUTURA DO APP (SHELL)
           ═══════════════════════════════════════════ */
        #app-screen {
            display: none; flex-direction: row; width: 96%; max-width: 1360px; height: 92vh;
            background: var(--bg-shell); border-radius: 28px; overflow: hidden;
            box-shadow: 0 40px 80px var(--shadow-dark); border: 1px solid var(--border);
        }

        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 30px 22px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .logo-escola { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-shell); margin-bottom: 20px; }
        
        .user-card { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 15px; text-align: center; margin-bottom: 15px; overflow: hidden;}
        /* Ajuste do nome para não cortar no Mobile */
        .user-card h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text-primary); white-space: normal; word-wrap: break-word; line-height: 1.2;}
        
        .role-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-glow); color: var(--accent); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; margin-top: 6px; }
        .clock-display { margin-top: 10px; font-family: 'Syne', monospace; font-size: 22px; font-weight: 800; color: var(--success); }

        .btn-tema { display: flex; align-items: center; gap: 8px; background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); padding: 9px 18px; border-radius: 20px; font-weight: 600; font-size: 12px; cursor: pointer; transition: 0.3s; width: 100%; justify-content: center;}

        /* ÁREA DE CONTEÚDO */
        .right-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .content-scroll { flex: 1; padding: 40px; overflow-y: auto; padding-bottom: 120px; }

        .aba { display: none; }
        .aba.ativa { display: block; animation: fadeUp 0.4s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .top-controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .control-group { flex: 1; }
        .field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        
        .box-textos { display: flex; gap: 15px; margin-bottom: 20px; }
        .info-box { flex: 1; padding: 15px; border-radius: 14px; background: var(--bg-input); border: 1.5px solid transparent; }
        .info-box.required { border-color: rgba(239,68,68,0.3); }

        .grade-horarios { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .slot { padding: 15px; text-align: center; border-radius: 14px; font-weight: 600; cursor: pointer; border: none; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 10px var(--shadow-dark); }
        .slot.livre { background: linear-gradient(135deg, #059669, #10b981); color: white; }
        .slot.ocupado { background: var(--bg-input); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; }

        .table-wrapper { overflow-x: auto; }
        .tabela { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .tabela th { padding: 10px 15px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .tabela td { padding: 15px; background: var(--bg-input); font-size: 14px; }
        .tabela td:first-child { border-radius: 12px 0 0 12px; font-weight: bold; color: var(--accent); }
        .tabela td:last-child { border-radius: 0 12px 12px 0; text-align: center; }

        .btn-action { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: rgba(239,68,68,0.12); color: var(--danger); transition: 0.2s; }
        .btn-action:hover { background: var(--danger); color: white; }

        /* ═══════════════════════════════════════════
           NAVBAR (Desktop e Mobile)
           ═══════════════════════════════════════════ */
        .navbar-wrap {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 100px; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(transparent, var(--bg-shell) 70%);
            pointer-events: none; z-index: 100;
        }
        .navigation {
            pointer-events: auto; width: 600px; height: 72px;
            background: var(--nav-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--border);
            box-shadow: 0 15px 35px var(--shadow-dark); display: flex; align-items: center; padding: 0 10px;
        }
        .nav-ul { display: flex; width: 100%; justify-content: space-evenly; list-style: none; position: relative; }
        .nav-item { width: 80px; height: 72px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: none; border: none; }
        .nav-item ion-icon { font-size: 24px; color: var(--text-muted); transition: 0.4s; }
        .nav-item.active ion-icon { transform: translateY(-30px); color: #fff; }
        .nav-item span { position: absolute; font-size: 10px; font-weight: 800; color: var(--accent); opacity: 0; transform: translateY(20px); transition: 0.4s; text-transform: uppercase; }
        .nav-item.active span { opacity: 1; transform: translateY(15px); }
        .indicator { position: absolute; top: -35px; width: 66px; height: 66px; background: var(--accent); border-radius: 50%; border: 5px solid var(--bg-shell); transition: 0.5s cubic-bezier(0.25, 1, 0.5, 1); z-index: -1; box-shadow: 0 5px 15px var(--accent-glow); }

        /* ═══════════════════════════════════════════
           RESPONSIVIDADE MOBILE
           ═══════════════════════════════════════════ */
        @media (max-width: 900px) {
            body { align-items: flex-start; overflow-y: auto; }
            #app-screen { 
                flex-direction: column; width: 100%; height: auto; min-height: 100vh; 
                border-radius: 0; border: none; margin: 0;
            }
            .sidebar { 
                width: 100%; height: auto; flex-direction: row; padding: 15px; 
                position: sticky; top: 0; z-index: 1000; border-right: none; 
                border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center;
            }
            .logo-escola { width: 50px; height: 50px; margin-bottom: 0; border-width: 2px; }
            
            /* Ajuste do nome para não cortar no Mobile */
            .user-card { flex: 1; margin: 0 10px; padding: 5px 10px; display: flex; align-items: center; justify-content: space-between; text-align: left; background: transparent; border: none; box-shadow: none;}
            .user-card h3 { font-size: 14px; margin: 0; line-height: 1.1;}
            .clock-display { font-size: 14px; margin: 0; }
            .role-badge { display: none; } 
            
            .btn-tema { width: auto; padding: 8px 12px; font-size: 0;}
            .btn-tema ion-icon { font-size: 18px; margin: 0;}
            .btn-tema span { display: none; } /* Esconde o texto "Modo Claro" no cel */

            .right-area { width: 100%; height: auto; }
            .content-scroll { padding: 20px 15px 120px 15px; overflow-y: visible; }
            .top-controls, .box-textos { flex-direction: column; }
            .grade-horarios { grid-template-columns: repeat(2, 1fr); }

            /* Navbar Mobile (FIXA NO RODAPÉ) */
            .navbar-wrap { 
                position: fixed; bottom: 0; height: 85px; width: 100%; 
                background: var(--nav-bg); border-top: 1px solid var(--border);
                backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            }
            .navigation { width: 100%; height: 100%; border-radius: 0; border: none; box-shadow: none; background: transparent; }
            .nav-item.active ion-icon { transform: translateY(-25px); }
            .indicator { border-color: var(--bg-root); }
        }
        
        @media (max-width: 400px) {
            .user-card h3 { font-size: 12px; }
            .clock-display { font-size: 12px; }
        }
        *, *::before, *::after { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        .slot, .nav-item ion-icon, .indicator { transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
    </style>
</head>
<body data-theme="dark">

<div id="section-login">
    <div class="login-box">
        <img src="logo.jpg" alt="Logo" class="logo-login" onerror="this.src='https://ui-avatars.com/api/?name=STE&background=3b82f6&color=fff'">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Acesso STE</h2>
        <input type="email" id="l-email" class="input-modern" placeholder="E-mail" style="margin-bottom: 12px;">
        <input type="password" id="l-pass" class="input-modern" placeholder="Senha" style="margin-bottom: 20px;">
        <button class="btn-neon" id="btn-login-action" onclick="logar()">Entrar no Sistema</button>
    </div>
</div>

<div id="app-screen">
    
    <div class="sidebar">

            <div>
                <h3 id="user-display">Carregando...</h3>

            <div class="clock-display" id="local-clock">00:00</div>

        <div style="width: 100%; display: flex; flex-direction: column; gap: 10px;">

                    <ion-icon name="cloud-download-outline"></ion-icon> <span>Baixar Excel</span>
                </button>
            </div>
        </div>
    </div>

    <div class="right-area">
        <div class="content-scroll">

            <div id="aba-agendar" class="aba ativa">
                <h2 style="font-family: 'Syne'; margin-bottom: 20px;">01. Agendar Recurso</h2>
                <div class="panel">
                    <div class="top-controls">

                                <optgroup label="Salas">
                                    <option value="STE 1">Sala STE 1</option>
                                    <option value="STE 2">Sala STE 2</option>
                                </optgroup>
                                <optgroup label="Equipamentos">
                                    <option value="Projetor 1">Projetor 1</option>
                                    <option value="Projetor 2">Projetor 2</option>
                                    <option value="Projetor 3">Projetor 3</option>
                                    <option value="Projetor 4">Projetor 4</option>
                                    <option value="Som 1">Som 1</option>
                                    <option value="Som 2">Som 2</option>
                                    <option value="TV">TV</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="control-group" id="box-admin-nome" style="display:none">
                            <label class="field-label" style="color:var(--warning)">Reservar para Prof:</label>
                            <input type="text" id="f-prof-admin" class="input-modern" placeholder="Nome do Professor">
                        </div>
                    </div>
                    <div class="box-textos">
                        <div id="box-just" class="info-box required">
                            <label id="tit-just" class="field-label">Obrigatório: Conteúdo</label>
                            <input type="text" id="f-justificativa" class="input-modern" placeholder="Assunto da aula...">
                        </div>
                        <div class="info-box optional">
                            <label class="field-label">Observação</label>
                            <input type="text" id="f-obs" class="input-modern" placeholder="Opcional">
                        </div>
                    </div>
                    <div class="grade-label">Horários Disponíveis</div>
                    <div class="grade-horarios" id="grid-horarios">Selecione uma data para ver...</div>
                </div>
            </div>

            <div id="aba-geral" class="aba">
                <h2 style="font-family: 'Syne'; margin-bottom: 20px;">02. Visão do Dia</h2>
                <div class="panel">
                    <div class="top-controls">
                        <div class="control-group"><input type="date" id="v-data" class="input-modern" onchange="carregarVisaoDia()"></div>
                        <div class="control-group">
                            <select id="v-recurso" class="input-modern" onchange="carregarVisaoDia()">
                                <option value="STE 1">STE 1</option><option value="STE 2">STE 2</option>
                                <option value="Projetor 1">Projetor 1</option><option value="Projetor 2">Projetor 2</option>
                                <option value="Projetor 3">Projetor 3</option><option value="Projetor 4">Projetor 4</option>
                                <option value="Som 1">Som 1</option><option value="Som 2">Som 2</option><option value="TV">TV</option>
                            </select>
                        </div>
                    </div>
                    <div class="grade-horarios" id="grid-visao"></div>
                </div>
            </div>

            <div id="aba-minhas" class="aba">
                <h2 style="font-family: 'Syne'; margin-bottom: 20px;">03. Minhas Reservas</h2>
                <div class="panel">
                    <div class="table-wrapper">
                        <table class="tabela">
                            <thead><tr><th>Data</th><th>Horário</th><th>Recurso</th><th style="text-align:center">Ação</th></tr></thead>
                            <tbody id="tabela-minhas"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="aba-admin" class="aba">
                <h2 style="font-family: 'Syne'; color: var(--warning); margin-bottom: 20px;">Painel Geral Admin</h2>
                <div class="panel">
                    <div class="table-wrapper">
                        <table class="tabela">
                            <thead><tr><th>Professor</th><th>Data</th><th>Horário</th><th>Recurso</th><th style="text-align:center">Ação</th></tr></thead>
                            <tbody id="tabela-admin"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="navbar-wrap">
            <nav class="navigation">
                <ul class="nav-ul" id="nav-ul">
                    <li class="nav-item active" onclick="ativarMenu(this, 'aba-agendar')"><a><ion-icon name="add-circle-outline"></ion-icon><span>Agendar</span></a></li>
                    <li class="nav-item" onclick="ativarMenu(this, 'aba-geral')"><a><ion-icon name="grid-outline"></ion-icon><span>Ver Dia</span></a></li>
                    <li class="nav-item" onclick="ativarMenu(this, 'aba-minhas')"><a><ion-icon name="bookmark-outline"></ion-icon><span>Minhas</span></a></li>
                    <li class="nav-item" onclick="sair()"><a><ion-icon name="log-out-outline"></ion-icon><span>Sair</span></a></li>
                    <div class="indicator" id="nav-indicator"></div>
                </ul>
            </nav>
        </div>
    </div>
</div>

    // ==========================================
    // MOTOR DA INTERFACE E NAVEGAÇÃO

    function atualizarRelogio() {
        const agora = new Date();
        const utc = agora.getTime() + (agora.getTimezoneOffset() * 60000);
        const dataMS = new Date(utc - (3600000 * 4));
        document.getElementById('local-clock').innerText = dataMS.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(atualizarRelogio, 1000); atualizarRelogio();

    function toggleTheme() {
        const b = document.body;
        const isDark = b.getAttribute('data-theme') === 'dark';
        if (isDark) { b.removeAttribute('data-theme'); document.querySelector('#theme-btn span').innerText = "Modo Escuro"; }
        else { b.setAttribute('data-theme', 'dark'); document.querySelector('#theme-btn span').innerText = "Modo Claro"; }
        setTimeout(() => { const active = document.querySelector('.nav-item.active'); if(active) ativarMenu(active, null); }, 400);
    }

    function ativarMenu(item, abaId) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const ind = document.getElementById('nav-indicator');
        ind.style.opacity = '1';
        
        const ulRect = document.getElementById('nav-ul').getBoundingClientRect();
        const liRect = item.getBoundingClientRect();
        const centro = (liRect.left - ulRect.left) + (item.offsetWidth / 2) - 33;
        ind.style.transform = `translateX(${centro}px)`;

        if(abaId) {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.getElementById(abaId).classList.add('ativa');
            if(abaId === 'aba-minhas') carregarMinhasReservas();
            if(abaId === 'aba-geral') carregarVisaoDia();
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }
    }

    function irParaAba(abaId) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('nav-indicator').style.opacity = '0';
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(abaId).classList.add('ativa');
        if(abaId === 'aba-admin') carregarReservasAdmin();
    }

    // ==========================================
    // FIREBASE: LOGICA E REGRAS
    // ==========================================
    async function logar() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        const btn = document.getElementById('btn-login-action');
        if(!e || !p) return alert("Preencha e-mail e senha!");
        btn.innerText = "Entrando..."; btn.disabled = true;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Credenciais inválidas!"); btn.innerText = "Entrar no Sistema"; btn.disabled = false; }
    }

    auth.onAuthStateChanged(user => {
        if(user) { userLogado = user; iniciarApp(); }
        else { document.getElementById('section-login').style.display='flex'; document.getElementById('app-screen').style.display='none'; }
    });

    function iniciarApp() {
        document.getElementById('section-login').style.display='none';
        document.getElementById('app-screen').style.display='flex';
        
        const nome = NOMES_PERSONALIZADOS[userLogado.email] || ("Prof. " + userLogado.email.split('@')[0]);
        document.getElementById('user-display').innerText = nome;
        document.getElementById('f-data').setAttribute('min', dataHoje);

        if(EMAILS_ADMIN.includes(userLogado.email)) {
            document.getElementById('admin-extras').style.display = 'block';
            document.getElementById('box-admin-nome').style.display = 'block';
            document.getElementById('user-role').innerHTML = '<ion-icon name="shield-checkmark-outline"></ion-icon> Admin';
        }
        
        ativarMenu(document.querySelector('.nav-item'), 'aba-agendar');
        resetarTimerInatividade();
    }

    async function verificarHorarios() {
        const dt = document.getElementById('f-data').value;
        const rc = document.getElementById('f-recurso').value;
        const grid = document.getElementById('grid-horarios');
        if(!dt) return;

        // TRAVA DIA 26
        const hoje = new Date();
        const diaH = hoje.getDate();
        const mesH = hoje.getMonth() + 1;
        const anoH = hoje.getFullYear();
        const p = dt.split('-');
        const isFuturo = (p[0] > anoH) || (p[0] == anoH && p[1] > mesH);
        
        if (isFuturo && diaH < 26) {
            alert("Agenda do mês seguinte só libera no dia 26!");
            document.getElementById('f-data').value = ""; 
            grid.innerHTML = "Selecione uma data válida...";
            return;
        }

        grid.innerHTML = "Buscando...";
        const snap = await db.collection("agendamentos").where("data", "==", dt).where("recurso", "==", rc).get();
        const ocupados = []; snap.forEach(doc => ocupados.push(doc.data().horario));
        
        grid.innerHTML = "";
        HORARIOS.forEach(hr => {
            const btn = document.createElement('button');
            btn.className = ocupados.includes(hr) ? "slot ocupado" : "slot livre";
            btn.innerHTML = `<span>${hr}</span><span>${ocupados.includes(hr) ? 'Ocupado' : 'Reservar'}</span>`;
            if(!ocupados.includes(hr)) btn.onclick = () => salvar(dt, rc, hr);
            grid.appendChild(btn);
        });
    }

    async function salvar(dt, rc, hr) {
        const j = document.getElementById('f-justificativa').value;
        const o = document.getElementById('f-obs').value;
        if(rc.includes('STE') && !j) return alert("Conteúdo obrigatório para as Salas STE!");
        
        let nomeSalvar = NOMES_PERSONALIZADOS[userLogado.email] || ("Prof. " + userLogado.email.split('@')[0]);
        const nomeDigitado = document.getElementById('f-prof-admin').value;
        if(EMAILS_ADMIN.includes(userLogado.email) && nomeDigitado) nomeSalvar = nomeDigitado;

        if(confirm(`Confirmar ${rc} para ${hr}?`)) {
            await db.collection("agendamentos").add({ 
                email_prof: userLogado.email, 
                nome_prof: nomeSalvar, 
                data: dt, 
                recurso: rc, 
                horario: hr, 
                justificativa: j, 
                observacao: o, 
                timestamp: firebase.firestore.FieldValue.serverTimestamp() 
            });
            alert("Agendado com sucesso!"); 
            document.getElementById('f-justificativa').value = "";
            verificarHorarios();
        }
    }

    async function carregarMinhasReservas() {
        const tb = document.getElementById('tabela-minhas'); 
        tb.innerHTML = "<tr><td colspan='4'>Carregando suas reservas...</td></tr>";
        
        // Busca TODAS as reservas deste professor (Solução para evitar o erro de index no Firebase)
        const snap = await db.collection("agendamentos").where("email_prof", "==", userLogado.email).get();
        
        // Filtra pelo JavaScript as reservas com datas maiores ou iguais a hoje e ordena
        let reservas = [];
        snap.forEach(doc => {
            if (doc.data().data >= dataHoje) {
                reservas.push({ id: doc.id, ...doc.data() });
            }
        });
        
        reservas.sort((a, b) => a.data.localeCompare(b.data)); // Organiza por data
        
        tb.innerHTML = "";
        if(reservas.length === 0) {
            tb.innerHTML = "<tr><td colspan='4'>Você não tem agendamentos futuros.</td></tr>";
            return;
        }

        reservas.forEach(d => {
            const dataBr = d.data.split('-').reverse().join('/');
            tb.innerHTML += `<tr>
                <td>${dataBr}</td><td>${d.horario}</td><td>${d.recurso}</td>
                <td style="text-align: center;"><button class="btn-action" onclick="deletar('${d.id}')"><ion-icon name="trash-outline"></ion-icon></button></td>
            </tr>`;
        });
    }

    async function carregarVisaoDia() {
        const dt = document.getElementById('v-data').value;
        const rc = document.getElementById('v-recurso').value;
        if(!dt) return;
        const snap = await db.collection("agendamentos").where("data", "==", dt).where("recurso", "==", rc).get();
        const mapa = {}; snap.forEach(doc => mapa[doc.data().horario] = doc.data().nome_prof);
        const grid = document.getElementById('grid-visao'); grid.innerHTML = "";
        HORARIOS.forEach(hr => { grid.innerHTML += `<div class="slot ${mapa[hr] ? 'ocupado' : 'livre'}"><span>${hr}</span><span>${mapa[hr] || 'Livre'}</span></div>`; });
    }

    async function carregarReservasAdmin() {
        const tb = document.getElementById('tabela-admin'); tb.innerHTML = "<tr><td colspan='5'>Carregando tudo...</td></tr>";
        const snap = await db.collection("agendamentos").orderBy("data").get(); 
        tb.innerHTML = "";
        if(snap.empty) tb.innerHTML = "<tr><td colspan='5'>Nenhuma reserva.</td></tr>";
        
        snap.forEach(doc => {
            const d = doc.data(); const dataBr = d.data.split('-').reverse().join('/');
            tb.innerHTML += `<tr>
                <td>${d.nome_prof}</td><td>${dataBr}</td><td>${d.horario}</td><td>${d.recurso}</td>
                <td style="text-align: center;"><button class="btn-action" onclick="deletar('${doc.id}')"><ion-icon name="close-circle-outline"></ion-icon></button></td>
            </tr>`;
        });
    }

    async function deletar(id) { 
        if(confirm("Deseja mesmo cancelar este agendamento?")) { 
            await db.collection("agendamentos").doc(id).delete(); 
            carregarMinhasReservas(); 
            carregarReservasAdmin(); 
            verificarHorarios(); // Atualiza a tela 1 se estiver nela
        } 
    }

    async function exportarCSV() {
        const snap = await db.collection("agendamentos").orderBy("data").get();
        let csv = "Prof;Data;Horario;Recurso\n";
        snap.forEach(doc => { const d = doc.data(); csv += `${d.nome_prof};${d.data};${d.horario};${d.recurso}\n`; });
        const blob = new Blob(["\ufeff"+csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Reservas_STE.csv"; link.click();
    }

    function atualizarRegraJustificativa() {
        const r = document.getElementById('f-recurso').value;
        const box = document.getElementById('box-just');
        if (r.includes('STE')) {
            box.className = 'info-box required';
            document.getElementById('tit-just').innerText = 'Obrigatório: Conteúdo da Aula';
        } else {
            box.className = 'info-box optional';
            document.getElementById('tit-just').innerText = 'Opcional: Observação';
        }
        verificarHorarios();
    }

    // AUTO LOGOUT
    let timer;
    function resetarTimerInatividade() {
        clearTimeout(timer);
        timer = setTimeout(() => { if(userLogado) { alert("Sessão encerrada por inatividade (5 Minutos)."); sair(); } }, 5 * 60 * 1000);
    }
    ['mousemove','mousedown','keypress','scroll','touchstart'].forEach(ev => document.addEventListener(ev, resetarTimerInatividade));

    async function sair() { await auth.signOut(); window.location.reload(); }
</script>
