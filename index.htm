<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel STE — Yvy Poty</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        /* TOKENS E TEMA */
        :root {
            --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.35);
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg-root: #f0f4ff; --bg-shell: #ffffff; --bg-sidebar: #fafbff; --bg-card: #f5f7ff;
            --bg-input: #eef1fb; --text-primary: #0f172a; --text-secondary: #475569;
            --text-muted: #94a3b8; --border: rgba(148,163,184,0.25);
            --shadow-dark: rgba(0,0,0,0.15); --nav-bg: rgba(255,255,255,0.95);
        }

        [data-theme="dark"] {
            --bg-root: #080c14; --bg-shell: #0e1422; --bg-sidebar: #0b1020; --bg-card: #131a2e;
            --bg-input: #0f1525; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-muted: #475569; --border: rgba(59,130,246,0.12);
            --shadow-dark: rgba(0,0,0,0.55); --nav-bg: rgba(13,19,35,0.95);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-root); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }

        /* TELA LOGIN NEON */
        #section-login { position: relative; width: 90%; max-width: 380px; padding: 4px; background: #111; border-radius: 24px; overflow: hidden; display: flex; box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 1000; }
        #section-login::before { content: ""; position: absolute; inset: -50%; background: conic-gradient(from 0deg, var(--accent), var(--success), var(--accent)); animation: spin 4s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-box { position: relative; z-index: 1; width: 100%; background: var(--bg-shell); border-radius: 20px; padding: 40px 30px; text-align: center; }
        .logo-login { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--border); margin-bottom: 20px; object-fit: cover; }
        .login-box h2 { font-family: 'Syne', sans-serif; margin-bottom: 20px; font-weight: 800;}
        .input-modern { width: 100%; height: 48px; padding: 0 16px; background: var(--bg-input); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text-primary); font-weight: 500; outline: none; margin-bottom: 12px; transition: 0.3s;}
        .input-modern:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
        .btn-neon { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), var(--success)); color: white; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }

        /* SHELL E SIDEBAR */
        #app-screen { display: none; flex-direction: row; width: 96%; max-width: 1360px; height: 92vh; background: var(--bg-shell); border-radius: 28px; overflow: hidden; box-shadow: 0 40px 80px var(--shadow-dark); border: 1px solid var(--border); }

        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 30px 22px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; position: relative;}
        .mobile-top-bar { display: contents; }
        .logo-escola { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-shell); margin-bottom: 20px; }
        .user-card { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 15px; text-align: center; margin-bottom: 15px; position: relative; overflow: hidden;}
        .user-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--success)); }
        .user-card h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: bold; white-space: normal; word-wrap: break-word; line-height: 1.2; margin-bottom: 5px;}
        .role-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-glow); color: var(--accent); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase;}
        .clock-display { margin-top: 10px; font-family: 'Syne', monospace; font-size: 20px; font-weight: 800; color: var(--success); }
        
        /* BOTÕES LATERAIS PADRONIZADOS */
        .sidebar-buttons { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        #admin-extras { display: none; flex-direction: column; gap: 10px; width: 100%; }

        .btn-sidebar { display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: 0.3s; border: none; }
        .btn-sidebar ion-icon { font-size: 18px; }
        .btn-sidebar:hover { filter: brightness(0.9); transform: translateY(-1px); }
        
        .btn-tema { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-admin-panel { background: linear-gradient(135deg, var(--warning), #e67e22); color: white; box-shadow: 0 4px 15px rgba(245,158,11,0.2); }
        .btn-admin-excel { background: linear-gradient(135deg, var(--success), #16a085); color: white; box-shadow: 0 4px 15px rgba(16,185,129,0.2); }

        /* ÁREA DIREITA E FORMULÁRIOS */
        .right-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: var(--bg-shell); }
        .content-scroll { flex: 1; padding: 40px; overflow-y: auto; padding-bottom: 120px; scrollbar-width: thin; scrollbar-color: var(--border) transparent;}
        .aba { display: none; } .aba.ativa { display: block; animation: fadeUp 0.4s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .section-header h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 20px;}
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        
        .top-controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .control-group { flex: 1; }
        .field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px;}
        
        .box-textos { display: flex; gap: 15px; margin-bottom: 20px; }
        .info-box { flex: 1; padding: 15px; border-radius: 14px; background: var(--bg-input); border: 1.5px solid transparent; transition: 0.3s; }
        .info-box.required { border-color: rgba(239,68,68,0.3); }
        .info-box.optional { border-color: rgba(59,130,246,0.3); }

        .grade-horarios { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .slot { padding: 15px; text-align: center; border-radius: 14px; font-weight: 600; cursor: pointer; border: none; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 10px var(--shadow-dark); transition: 0.2s;}
        .slot.livre { background: linear-gradient(135deg, #059669, #10b981); color: white; }
        .slot.ocupado { background: var(--bg-input); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; }

        .tabela { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .tabela th { padding: 10px 15px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .tabela td { padding: 15px; background: var(--bg-input); font-size: 14px; }
        .tabela td:first-child { border-radius: 12px 0 0 12px; font-weight: bold; color: var(--accent); }
        .tabela td:last-child { border-radius: 0 12px 12px 0; text-align: center; }
        
        .btn-action { padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; background: rgba(239,68,68,0.12); color: var(--danger); font-size: 16px; transition: 0.2s;}
        .btn-action:hover { background: var(--danger); color: white;}

        /* NAVBAR PÍLULA */
        .navbar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 100px; display: flex; justify-content: center; align-items: center; background: linear-gradient(transparent, var(--bg-shell) 70%); pointer-events: none; }
        .navigation { pointer-events: auto; width: 550px; height: 72px; background: var(--nav-bg); backdrop-filter: blur(20px); border-radius: 22px; border: 1px solid var(--border); box-shadow: 0 16px 48px var(--shadow-dark); display: flex; align-items: center; padding: 0 10px; }
        .nav-ul { display: flex; width: 100%; justify-content: space-evenly; list-style: none; margin: 0; padding: 0;}
        .nav-item { width: 100px; height: 56px; border-radius: 14px; cursor: pointer; border: none; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; gap: 2px; }
        .nav-item.active { background: var(--accent); box-shadow: 0 6px 20px var(--accent-glow); }
        .nav-item ion-icon { font-size: 22px; color: var(--text-muted); }
        .nav-item.active ion-icon { color: #fff; }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .nav-item.active span { color: rgba(255,255,255,0.9); }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 900px) {
            #app-screen { flex-direction: column; width: 100%; height: auto; min-height: 100vh; border-radius: 0; border: none; }
            .sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; padding: 15px 20px; position: sticky; top: 0; z-index: 1000; border-right: none; border-bottom: 1px solid var(--border); box-shadow: 0 4px 20px var(--shadow-dark); }
            
            .mobile-top-bar { display: flex; width: 100%; align-items: center; gap: 15px; margin-bottom: 15px; }
            .logo-escola { width: 55px; height: 55px; margin: 0; border-width: 2px; }
            .user-card { margin: 0; flex: 1; padding: 8px 12px; display: flex; flex-direction: column; align-items: flex-start; text-align: left; background: transparent; border: none;}
            .user-card::before { display: none; }
            .user-card h3 { font-size: 15px; margin: 0; line-height: 1.1; }
            .clock-display { font-size: 13px; margin: 0; }
            .role-badge { display: none; }

            .sidebar-buttons { flex-direction: row; flex-wrap: nowrap; gap: 10px;}
            .btn-sidebar { padding: 10px; font-size: 11px; flex: 1;}
            #admin-extras { flex-direction: row; flex-wrap: nowrap; }
            .btn-admin-panel span::after { content: "Admin"; font-size: 11px;}
            .btn-admin-panel span { font-size: 0; }
            .btn-admin-excel span::after { content: "Excel"; font-size: 11px;}
            .btn-admin-excel span { font-size: 0; }
            
            .right-area { width: 100%; height: auto; }
            .content-scroll { padding: 20px 15px 120px 15px; overflow-y: visible; }
            .top-controls, .box-textos { flex-direction: column; gap: 12px;}
            .grade-horarios { grid-template-columns: repeat(2, 1fr); }

            .navbar-wrap { position: fixed; bottom: 0; height: 85px; width: 100%; background: var(--nav-bg); border-top: 1px solid var(--border); }
            .navigation { width: 100%; height: 100%; border-radius: 0; border: none; box-shadow: none; background: transparent; padding: 0;}
            .nav-item { width: 25%; }
        }
        *, *::before, *::after { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
    </style>
</head>
<body data-theme="dark">

<div id="section-login">
    <div class="login-box">
        <img src="logo.jpg" alt="Logo Escola" class="logo-login" onerror="this.src='https://ui-avatars.com/api/?name=STE&background=3b82f6&color=fff'">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Acesso STE</h2>
        <input type="email" id="l-email" class="input-modern" placeholder="E-mail" style="margin-bottom: 12px;">
        <input type="password" id="l-pass" class="input-modern" placeholder="Senha" style="margin-bottom: 20px;">
        <button class="btn-neon" id="btn-login-action" onclick="logar()">Entrar no Sistema</button>
    </div>
</div>

<div id="app-screen">
    
    <div class="sidebar">

            <div id="admin-extras">

                </button>
                <button class="btn-sidebar btn-admin-excel" onclick="exportarCSV()">

                </button>
            </div>
        </div>
    </div>

    <div class="right-area">
        <div class="content-scroll">

                                    <option value="Laboratório">Laboratório</option>
                                </optgroup>
                                <optgroup label="Audiovisual">
                                    <option value="Projetor 1">Projetor 1</option>

                                    <option value="Projetor 3">Projetor 3</option>

                                </optgroup>
                            </select>
                        </div>
                    </div>
                    <div class="grade-horarios" id="grid-visao"></div>
                </div>
            </div>

            <div id="aba-minhas" class="aba">

                            <tbody id="tabela-minhas"><tr><td colspan="4" style="text-align:center">Carregando...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>

                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="navbar-wrap">

                    <button class="nav-item active" onclick="irParaAba('aba-agendar', this)"><ion-icon name="add-circle-outline"></ion-icon><span>Agendar</span></button>
                    <button class="nav-item" onclick="irParaAba('aba-geral', this)"><ion-icon name="grid-outline"></ion-icon><span>Ver Dia</span></button>

            </nav>
        </div>
    </div>
</div>

    function atualizarRelogio() {
        const agora = new Date();
        const utc = agora.getTime() + (agora.getTimezoneOffset() * 60000);
        const dataMS = new Date(utc - (3600000 * 4));
        document.getElementById('local-clock').innerText = dataMS.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(atualizarRelogio, 1000); atualizarRelogio();

    function toggleTheme() {
        const b = document.body;
        const btnText = document.querySelector('#theme-btn span');
        const icon = document.querySelector('#theme-btn ion-icon');
        if (b.getAttribute('data-theme') === 'dark') {
            b.removeAttribute('data-theme');
            icon.name = 'moon-outline'; 
            if(btnText) btnText.innerText = 'Modo Escuro';
        } else {
            b.setAttribute('data-theme', 'dark');
            icon.name = 'sunny-outline'; 
            if(btnText) btnText.innerText = 'Modo Claro';
        }
    }

    function irParaAba(abaId, btnClicado) {
        if(btnClicado) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btnClicado.classList.add('active');
        }
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(abaId).classList.add('ativa');

        if(abaId === 'aba-minhas') carregarMinhasReservas();
        if(abaId === 'aba-geral') carregarVisaoDia();
        if(abaId === 'aba-admin') carregarReservasAdmin();
        
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    }

    // NOVA REGRA DE JUSTIFICATIVA ABRANGENDO SALA DE ARTE E LABORATÓRIO
    function atualizarRegraJustificativa() {
        const recurso = document.getElementById('f-recurso').value;
        const caixa = document.getElementById('caixa-justificativa');
        const titulo = document.getElementById('tit-just');
        
        if (recurso.includes('STE') || recurso.includes('Arte') || recurso.includes('Laboratório')) {
            caixa.classList.remove('optional');
            caixa.classList.add('required');
            titulo.innerText = 'Obrigatório: Conteúdo da Aula';
            titulo.style.color = 'var(--danger)';
        } else {
            caixa.classList.remove('required');
            caixa.classList.add('optional');
            titulo.innerText = 'Opcional: Observação';
            titulo.style.color = 'var(--accent)';
        }
        verificarHorarios();
    }

    // ==========================================
    // FIREBASE: LOGIN E SESSÃO
    // ==========================================
    async function logar() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        const btn = document.getElementById('btn-login-action');
        if(!e || !p) return alert("Preencha e-mail e senha!");
        btn.innerText = "Entrando..."; btn.disabled = true;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Credenciais inválidas!"); btn.innerText = "Entrar no Sistema"; btn.disabled = false; }
    }

    auth.onAuthStateChanged(user => {
        if(user) { userLogado = user; iniciarApp(); }
        else { document.getElementById('section-login').style.display='flex'; document.getElementById('app-screen').style.display='none'; }
    });

    function iniciarApp() {
        document.getElementById('section-login').style.display='none';
        document.getElementById('app-screen').style.display='flex';
        
        const nome = NOMES_PERSONALIZADOS[userLogado.email] || ("Prof. " + userLogado.email.split('@')[0]);
        document.getElementById('user-display').innerText = nome;
        document.getElementById('f-data').setAttribute('min', dataHoje);

        if(EMAILS_ADMIN.includes(userLogado.email)) {
            document.getElementById('admin-extras').style.display = 'flex';
            document.getElementById('box-admin-nome').style.display = 'block';
            document.getElementById('user-role').innerHTML = '<ion-icon name="shield-checkmark-outline"></ion-icon> Admin';
            
            const selectProf = document.getElementById('f-prof-admin');
            selectProf.innerHTML = '<option value="">Agendar para mim (Admin)</option>';
            for (const emailProf in NOMES_PERSONALIZADOS) {
                selectProf.innerHTML += `<option value="${emailProf}">${NOMES_PERSONALIZADOS[emailProf]}</option>`;
            }
        }
        
        irParaAba('aba-agendar', document.querySelector('.nav-item'));
        resetarTimerInatividade();
    }

    // ==========================================
    // FIREBASE: AGENDAMENTO E LEITURA
    // ==========================================
    async function verificarHorarios() {
        const dt = document.getElementById('f-data').value;
        const rc = document.getElementById('f-recurso').value;
        const grid = document.getElementById('grid-horarios');
        if(!dt) return;

        const p = dt.split('-');
        const isFuturo = (p[0] > anoH) || (p[0] == anoH && p[1] > mesH);
        
        if (isFuturo && hojeObj.getDate() < 26) {
            alert("A agenda do mês seguinte só é liberada a partir do dia 26!");
            document.getElementById('f-data').value = ""; grid.innerHTML = "Selecione uma data permitida para ver os horários."; return;
        }

        grid.innerHTML = "Buscando...";
        const snap = await db.collection("agendamentos").where("data", "==", dt).where("recurso", "==", rc).get();
        const ocupados = []; snap.forEach(doc => ocupados.push(doc.data().horario));
        
        grid.innerHTML = "";
        HORARIOS.forEach(hr => {
            const btn = document.createElement('button');
            btn.className = ocupados.includes(hr) ? "slot ocupado" : "slot livre";
            btn.innerHTML = `<span>${hr}</span><span>${ocupados.includes(hr) ? 'Ocupado' : 'Reservar'}</span>`;
            if(!ocupados.includes(hr)) btn.onclick = () => salvar(dt, rc, hr);
            grid.appendChild(btn);
        });
    }

    async function salvar(dt, rc, hr) {
        const j = document.getElementById('f-justificativa').value;
        const o = document.getElementById('f-obs').value;
        
        if((rc.includes('STE') || rc.includes('Arte') || rc.includes('Laboratório')) && !j) {
            return alert("O Conteúdo da Aula é obrigatório para as Salas Especiais e Laboratórios!");
        }
        
        let emailSalvar = userLogado.email;
        let nomeSalvar = NOMES_PERSONALIZADOS[userLogado.email] || ("Prof. " + userLogado.email.split('@')[0]);
        
        if(EMAILS_ADMIN.includes(userLogado.email)) {
            const emailEscolhido = document.getElementById('f-prof-admin').value;
            if(emailEscolhido !== '') {
                emailSalvar = emailEscolhido;
                nomeSalvar = NOMES_PERSONALIZADOS[emailEscolhido];
            }
        }

        if(confirm(`Confirmar ${rc} para ${hr}?`)) {
            await db.collection("agendamentos").add({ 
                email_prof: emailSalvar, 
                nome_prof: nomeSalvar, 
                data: dt, recurso: rc, horario: hr, justificativa: j, observacao: o, 
                timestamp: firebase.firestore.FieldValue.serverTimestamp() 
            });
            alert("Agendado com sucesso!"); 
            document.getElementById('f-justificativa').value = ""; document.getElementById('f-obs').value = "";
            verificarHorarios();
        }
    }

    async function carregarMinhasReservas() {
        const tb = document.getElementById('tabela-minhas'); tb.innerHTML = "<tr><td colspan='4' style='text-align:center'>Buscando...</td></tr>";
        const snap = await db.collection("agendamentos").where("email_prof", "==", userLogado.email).get();
        
        let reservas = [];
        snap.forEach(doc => { 
            if (doc.data().data >= dataHoje) {
                reservas.push({ id: doc.id, ...doc.data() }); 
            }
        });
        reservas.sort((a, b) => a.data.localeCompare(b.data)); 
        
        tb.innerHTML = "";
        if(reservas.length === 0) { tb.innerHTML = "<tr><td colspan='4' style='text-align:center'>Você não tem agendamentos futuros.</td></tr>"; return; }
        reservas.forEach(d => {
            const dataBr = d.data.split('-').reverse().join('/');
            tb.innerHTML += `<tr><td>${dataBr}</td><td>${d.horario}</td><td><span style="font-weight:600">${d.recurso}</span></td><td style="text-align:center"><button class="btn-action" onclick="deletar('${d.id}')"><ion-icon name="trash-outline"></ion-icon></button></td></tr>`;
        });
    }

    async function carregarVisaoDia() {
        const dt = document.getElementById('v-data').value;
        const rc = document.getElementById('v-recurso').value;
        const grid = document.getElementById('grid-visao');
        if(!dt) return; grid.innerHTML = "Carregando...";
        const snap = await db.collection("agendamentos").where("data", "==", dt).where("recurso", "==", rc).get();
        const mapa = {}; snap.forEach(doc => mapa[doc.data().horario] = doc.data().nome_prof);
        grid.innerHTML = "";
        HORARIOS.forEach(hr => { grid.innerHTML += `<div class="slot ${mapa[hr] ? 'ocupado' : 'livre'}"><span>${hr}</span><span>${mapa[hr] || 'Livre'}</span></div>`; });
    }

    async function carregarReservasAdmin() {
        const tb = document.getElementById('tabela-admin'); tb.innerHTML = "<tr><td colspan='6' style='text-align:center'>Carregando tudo...</td></tr>";
        const snap = await db.collection("agendamentos").orderBy("data").get(); 
        
        tb.innerHTML = "";
        let temReserva = false;

        snap.forEach(doc => {
            const d = doc.data(); 
            if (d.data >= dataHoje) {
                temReserva = true;
                const dataBr = d.data.split('-').reverse().join('/');
                
                // Colorir chips por tipo de sala para melhor visualização
                let corChip = "rgba(59,130,246,0.12); color: var(--accent)";
                if (d.recurso.includes("Arte") || d.recurso.includes("Laboratório")) corChip = "rgba(16,185,129,0.12); color: var(--success)";
                if (d.recurso.includes("STE")) corChip = "rgba(245,158,11,0.12); color: var(--warning)";
                
                tb.innerHTML += `<tr>
                    <td>${d.nome_prof}</td>
                    <td>${dataBr}</td>
                    <td>${d.horario}</td>
                    <td><span style="background: ${corChip}; padding: 4px 10px; border-radius: 20px; font-weight:bold; font-size:12px;">${d.recurso}</span></td>
                    <td style="font-size: 11px; max-width: 150px; word-wrap: break-word;">${d.justificativa || '-'} <br> <i style="color:var(--text-muted)">${d.observacao || ''}</i></td>
                    <td style="text-align:center"><button class="btn-action" onclick="deletar('${doc.id}')"><ion-icon name="close-circle-outline"></ion-icon></button></td>
                </tr>`;
            }
        });
        
        if(!temReserva) { tb.innerHTML = "<tr><td colspan='6' style='text-align:center'>Nenhuma reserva futura.</td></tr>"; }
    }

    async function deletar(id) { if(confirm("Deseja mesmo cancelar este agendamento?")) { await db.collection("agendamentos").doc(id).delete(); carregarMinhasReservas(); carregarReservasAdmin(); verificarHorarios(); } }
    
    async function exportarCSV() {
        const snap = await db.collection("agendamentos").orderBy("data").get();
        let csv = "Prof;Data;Horario;Recurso;Conteudo;Observacao\n";
        snap.forEach(doc => { const d = doc.data(); csv += `${d.nome_prof};${d.data};${d.horario};${d.recurso};${d.justificativa || '-'};${d.observacao || '-'}\n`; });
        const blob = new Blob(["\ufeff"+csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Reservas_Yvy_Poty.csv"; link.click();
    }

    let timer;
    function resetarTimerInatividade() {
        clearTimeout(timer);
        timer = setTimeout(() => { if(userLogado) { alert("Sessão encerrada por inatividade (5 Minutos)."); sair(); } }, 5 * 60 * 1000);
    }
    ['mousemove','mousedown','keypress','scroll','touchstart'].forEach(ev => document.addEventListener(ev, resetarTimerInatividade));
    async function sair() { await auth.signOut(); window.location.reload(); }
</script>
