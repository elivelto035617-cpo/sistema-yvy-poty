<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel STE — Yvy Poty</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        /* ═══════════════════════════════════════════
           TOKENS E TEMA
        ═══════════════════════════════════════════ */
        :root {
            --accent: #3b82f6; --accent-deep: #1d4ed8; --accent-glow: rgba(59,130,246,0.25);
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg-root: #f0f4ff; --bg-shell: #ffffff; --bg-sidebar: #fafbff; --bg-card: #f5f7ff;
            --bg-input: #eef1fb; --text-primary: #0f172a; --text-secondary: #475569;
            --text-muted: #94a3b8; --border: rgba(148,163,184,0.25);
            --shadow: rgba(0,0,0,0.12); --nav-bg: rgba(255,255,255,0.95);
            --radius-card: 20px; --radius-input: 12px; --radius-slot: 14px;
        }
        [data-theme="dark"] {
            --bg-root: #080c14; --bg-shell: #0e1422; --bg-sidebar: #0b1020; --bg-card: #131a2e;
            --bg-input: #0f1525; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-muted: #475569; --border: rgba(59,130,246,0.12);
            --shadow: rgba(0,0,0,0.5); --nav-bg: rgba(13,19,35,0.95);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-root);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; overflow-y: auto;
            color: var(--text-primary);
            transition: background 0.4s;
        }

        /* ═══════════════════════════════════════════
           TOAST NOTIFICATIONS
        ═══════════════════════════════════════════ */
        #toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 18px; border-radius: 14px;
            background: var(--bg-shell); border: 1px solid var(--border);
            box-shadow: 0 8px 24px var(--shadow);
            font-weight: 600; font-size: 14px;
            animation: slideIn 0.3s ease, fadeOut 0.4s ease 2.6s forwards;
            pointer-events: auto; color: var(--text-primary);
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error   { border-left: 4px solid var(--danger);  }
        .toast.info    { border-left: 4px solid var(--accent);  }
        @keyframes slideIn  { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut  { from { opacity: 1; } to { opacity: 0; transform: translateX(20px); } }

        /* ═══════════════════════════════════════════
           LOGIN
        ═══════════════════════════════════════════ */
        #section-login {
            position: relative; width: 90%; max-width: 380px; padding: 4px;
            background: #111; border-radius: 24px; overflow: hidden;
            display: flex; box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 1000;
        }
        #section-login::before {
            content: ""; position: absolute; inset: -50%;
            background: conic-gradient(from 0deg, var(--accent), var(--success), var(--accent));
            animation: spin 4s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-box {
            position: relative; z-index: 1; width: 100%;
            background: var(--bg-shell); border-radius: 20px; padding: 40px 30px; text-align: center;
        }
        .logo-login { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--border); margin-bottom: 20px; object-fit: cover; }
        .login-box h2 { font-family: 'Syne', sans-serif; margin-bottom: 20px; color: var(--text-primary); }

        /* ═══════════════════════════════════════════
           INPUTS & BOTÕES REUTILIZÁVEIS
        ═══════════════════════════════════════════ */
        .input-modern {
            width: 100%; height: 48px; padding: 0 15px;
            background: var(--bg-input); border: 1.5px solid var(--border);
            border-radius: var(--radius-input); color: var(--text-primary);
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
            outline: none; margin-bottom: 12px; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-modern:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
        select.input-modern { cursor: pointer; }

        .btn-neon {
            width: 100%; padding: 14px; border-radius: var(--radius-input); border: none;
            background: linear-gradient(135deg, var(--accent), var(--success));
            color: white; font-family: 'Syne', sans-serif; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 10px;
        }
        .btn-neon:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn-neon:active { transform: translateY(0); }
        .btn-neon:disabled { opacity: 0.6; cursor: not-allowed; }

        /* ═══════════════════════════════════════════
           APP SHELL
        ═══════════════════════════════════════════ */
        #app-screen {
            display: none; flex-direction: row;
            width: 96%; max-width: 1360px; height: 92vh;
            background: var(--bg-shell); border-radius: 28px; overflow: hidden;
            box-shadow: 0 40px 80px var(--shadow); border: 1px solid var(--border);
        }

        /* ═══════════════════════════════════════════
           SIDEBAR
        ═══════════════════════════════════════════ */
        .sidebar {
            width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
            padding: 30px 22px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
        }
        .mobile-top-bar { display: contents; }
        .logo-escola { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-shell); margin-bottom: 20px; }
        .user-card {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 18px; padding: 15px; text-align: center; margin-bottom: 15px;
            overflow: hidden; position: relative;
        }
        .user-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--success)); }
        .user-card h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text-primary); word-wrap: break-word; line-height: 1.3; }
        .role-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-glow); color: var(--accent); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; margin-top: 6px; }
        .clock-display { margin-top: 10px; font-family: 'Syne', monospace; font-size: 22px; font-weight: 800; color: var(--success); }

        .sidebar-buttons { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .btn-sidebar {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            background: var(--bg-card); color: var(--text-secondary);
            border: 1px solid var(--border); padding: 12px; border-radius: var(--radius-input);
            font-weight: 600; font-size: 13px; cursor: pointer; transition: filter 0.2s; width: 100%;
        }
        .btn-sidebar:hover { filter: brightness(0.88); }
        #admin-extras { display: none; flex-direction: column; gap: 10px; width: 100%; }

        /* ═══════════════════════════════════════════
           CONTEÚDO DIREITO
        ═══════════════════════════════════════════ */
        .right-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .content-scroll { flex: 1; padding: 40px 40px 140px; overflow-y: auto; scrollbar-width: thin; }

        .aba { display: none; }
        .aba.ativa { display: block; animation: fadeUp 0.35s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 22px; }
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 25px; margin-bottom: 25px; }

        .top-controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .control-group { flex: 1; }
        .field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 8px; }

        .box-textos { display: flex; gap: 15px; margin-bottom: 20px; }
        .info-box { flex: 1; padding: 15px; border-radius: var(--radius-slot); background: var(--bg-input); border: 1.5px solid transparent; }
        .info-box.required { border-color: rgba(239,68,68,0.3); }

        /* ═══════════════════════════════════════════
           GRADE DE HORÁRIOS — COM ESTADO LOADING
        ═══════════════════════════════════════════ */
        .grade-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.05em; }
        .grade-horarios { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        .slot {
            padding: 15px; text-align: center; border-radius: var(--radius-slot);
            font-weight: 600; border: none; display: flex; flex-direction: column;
            gap: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .slot .slot-hr  { font-size: 11px; font-weight: 700; opacity: 0.8; }
        .slot .slot-sub { font-size: 12px; }
        .slot.livre {
            background: linear-gradient(135deg, #059669, #10b981); color: white;
            cursor: pointer; box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }
        .slot.livre:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.4); }
        .slot.ocupado {
            background: var(--bg-input); color: var(--text-muted);
            border: 1px solid var(--border); cursor: not-allowed;
        }
        /* Skeleton loading para horários */
        .slot.skeleton {
            background: linear-gradient(90deg, var(--bg-input) 25%, var(--border) 50%, var(--bg-input) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite; border: none; cursor: default;
            height: 70px;
        }
        @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* ═══════════════════════════════════════════
           TABELAS
        ═══════════════════════════════════════════ */
        .table-wrapper { overflow-x: auto; }
        .tabela { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .tabela th { padding: 10px 15px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .tabela td { padding: 14px 15px; background: var(--bg-input); font-size: 14px; vertical-align: middle; }
        .tabela td:first-child { border-radius: 12px 0 0 12px; font-weight: 700; color: var(--accent); }
        .tabela td:last-child { border-radius: 0 12px 12px 0; text-align: center; }
        .tabela tr:hover td { filter: brightness(0.96); }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
        .empty-state ion-icon { font-size: 36px; display: block; margin-bottom: 10px; }

        .badge-recurso {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
            background: var(--accent-glow); color: var(--accent);
        }

        .btn-action {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 8px; border: none;
            font-size: 12px; font-weight: 600; cursor: pointer;
            background: rgba(239,68,68,0.1); color: var(--danger);
            transition: background 0.2s;
        }
        .btn-action:hover { background: rgba(239,68,68,0.2); }

        /* ═══════════════════════════════════════════
           NAVBAR INFERIOR
        ═══════════════════════════════════════════ */
        .navbar-wrap {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 100px; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(transparent, var(--bg-shell) 70%); pointer-events: none; z-index: 100;
        }
        .navigation {
            pointer-events: auto; width: 600px; height: 72px;
            background: var(--nav-bg); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--border);
            box-shadow: 0 15px 35px var(--shadow); display: flex; align-items: center;
        }
        .nav-ul { display: flex; width: 100%; height: 100%; justify-content: space-evenly; align-items: center; list-style: none; position: relative; padding: 0; margin: 0; }
        .nav-item { width: 80px; height: 100%; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: none; border: none; z-index: 2; }
        .nav-item ion-icon { font-size: 24px; color: var(--text-muted); transition: transform 0.4s, color 0.4s; }
        .nav-item.active ion-icon { transform: translateY(-30px); color: #fff; }
        .nav-item span { position: absolute; font-size: 10px; font-weight: 800; color: var(--accent); opacity: 0; transform: translateY(20px); transition: opacity 0.4s, transform 0.4s; text-transform: uppercase; }
        .nav-item.active span { opacity: 1; transform: translateY(15px); }
        .indicator { position: absolute; top: -35px; width: 66px; height: 66px; background: var(--accent); border-radius: 50%; border: 5px solid var(--bg-shell); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1; box-shadow: 0 5px 15px var(--accent-glow); }

        /* ═══════════════════════════════════════════
           MODAL DE CONFIRMAÇÃO (substitui confirm())
        ═══════════════════════════════════════════ */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            display: flex; justify-content: center; align-items: center; z-index: 8000;
            backdrop-filter: blur(4px); animation: fadeIn 0.2s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-box {
            background: var(--bg-shell); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; max-width: 360px; width: 90%;
            box-shadow: 0 20px 50px var(--shadow); text-align: center;
        }
        .modal-box h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 10px; }
        .modal-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: var(--radius-input); border: none; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.2s; }
        .modal-btn.cancel { background: var(--bg-input); color: var(--text-secondary); }
        .modal-btn.confirm { background: linear-gradient(135deg, var(--accent), var(--success)); color: white; }
        .modal-btn:hover { opacity: 0.85; }

        /* ═══════════════════════════════════════════
           RESPONSIVIDADE MOBILE
        ═══════════════════════════════════════════ */
        @media (max-width: 900px) {
            body { align-items: flex-start; }
            #app-screen { flex-direction: column; width: 100%; height: auto; min-height: 100vh; border-radius: 0; border: none; margin: 0; }
            .sidebar { width: 100%; height: auto; padding: 15px; position: sticky; top: 0; z-index: 1000; border-right: none; border-bottom: 1px solid var(--border); box-shadow: 0 5px 15px var(--shadow); }
            .mobile-top-bar { display: flex; width: 100%; align-items: center; gap: 15px; margin-bottom: 15px; }
            .logo-escola { width: 55px; height: 55px; margin: 0; border-width: 2px; }
            .user-card { margin: 0; flex: 1; padding: 10px 15px; display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
            .user-card::before { display: none; }
            .user-card h3 { font-size: 15px; }
            .clock-display { font-size: 13px; margin: 0; }
            .role-badge { display: none; }
            .sidebar-buttons { flex-direction: row; flex-wrap: wrap; }
            .sidebar-buttons > button { flex: 1; }
            #admin-extras { flex-direction: row; }
            #admin-extras button { flex: 1; }
            .btn-sidebar span { display: none; }
            .right-area { width: 100%; height: auto; }
            .content-scroll { padding: 20px 15px 120px; overflow-y: visible; }
            .top-controls, .box-textos { flex-direction: column; gap: 12px; margin-bottom: 15px; }
            .grade-horarios { grid-template-columns: repeat(2, 1fr); }
            .navbar-wrap { position: fixed; bottom: 0; height: 85px; width: 100%; background: var(--nav-bg); border-top: 1px solid var(--border); }
            .navigation { width: 100%; height: 100%; border-radius: 0; border: none; box-shadow: none; background: transparent; }
            .indicator { border-color: var(--bg-root); top: -25px; width: 60px; height: 60px; }
            .nav-item.active ion-icon { transform: translateY(-20px); }
            .nav-item.active span { transform: translateY(12px); font-size: 9px; }
        }

        /* Transições globais suaves (sem transition em elementos animados manualmente) */
        body, .sidebar, .panel, .tabela td, .user-card, .btn-sidebar, .input-modern {
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body data-theme="dark">

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Modal de Confirmação -->
<div id="modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <h3 id="modal-title">Confirmar</h3>
        <p id="modal-msg"></p>
        <div class="modal-actions">
            <button class="modal-btn cancel" id="modal-cancel">Cancelar</button>
            <button class="modal-btn confirm" id="modal-ok">Confirmar</button>
        </div>
    </div>
</div>

<!-- LOGIN -->
<div id="section-login">
    <div class="login-box">
        <img src="logo.jpg" alt="Logo" class="logo-login"
             onerror="this.src='https://ui-avatars.com/api/?name=STE&background=3b82f6&color=fff'">
        <h2>Acesso STE</h2>
        <input type="email" id="l-email" class="input-modern" placeholder="E-mail" autocomplete="email">
        <input type="password" id="l-pass" class="input-modern" placeholder="Senha" autocomplete="current-password">
        <button class="btn-neon" id="btn-login-action" onclick="logar()">Entrar no Sistema</button>
    </div>
</div>

<!-- APP -->
<div id="app-screen">

    <div class="sidebar">
        <div class="mobile-top-bar">
            <img src="logo.jpg" alt="Logo" class="logo-escola"
                 onerror="this.src='https://ui-avatars.com/api/?name=STE&background=3b82f6&color=fff&size=130&bold=true&rounded=true'">
            <div class="user-card">
                <h3 id="user-display">Carregando...</h3>
                <span class="role-badge" id="user-role"><ion-icon name="person-outline"></ion-icon> Professor</span>
                <div class="clock-display" id="local-clock">--:--</div>
            </div>
        </div>

        <div class="sidebar-buttons">
            <button class="btn-sidebar" id="theme-btn" onclick="toggleTheme()" title="Alternar tema">
                <ion-icon name="sunny-outline" style="font-size:18px"></ion-icon>
                <span>Modo Claro</span>
            </button>
            <div id="admin-extras">
                <button class="btn-sidebar" onclick="irParaAba('aba-admin')"
                    style="background:var(--warning);color:white;border-color:var(--warning)" title="Painel Admin">
                    <ion-icon name="shield-checkmark-outline" style="font-size:18px"></ion-icon>
                    <span>Admin</span>
                </button>
                <button class="btn-sidebar" onclick="exportarCSV()"
                    style="background:var(--success);color:white;border-color:var(--success)" title="Exportar CSV">
                    <ion-icon name="cloud-download-outline" style="font-size:18px"></ion-icon>
                    <span>Exportar</span>
                </button>
            </div>
        </div>
    </div>

    <div class="right-area">
        <div class="content-scroll">

            <!-- ABA: AGENDAR -->
            <div id="aba-agendar" class="aba ativa">
                <h2 class="section-title">Agendar Recurso</h2>
                <div class="panel">
                    <div class="top-controls">
                        <div class="control-group">
                            <label class="field-label" for="f-data">Data</label>
                            <input type="date" id="f-data" class="input-modern" onchange="onDataRecursoChange()">
                        </div>
                        <div class="control-group">
                            <label class="field-label" for="f-recurso">Equipamento</label>
                            <select class="input-modern" id="f-recurso" onchange="onDataRecursoChange()">
                                <optgroup label="Salas">
                                    <option value="STE 1">Sala STE 1</option>
                                    <option value="STE 2">Sala STE 2</option>
                                </optgroup>
                                <optgroup label="Equipamentos">
                                    <option value="Projetor 1">Projetor 1</option>
                                    <option value="Projetor 2">Projetor 2</option>
                                    <option value="Projetor 3">Projetor 3</option>
                                    <option value="Projetor 4">Projetor 4</option>
                                    <option value="Som 1">Som 1</option>
                                    <option value="Som 2">Som 2</option>
                                    <option value="TV">TV</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="control-group" id="box-admin-nome" style="display:none">
                            <label class="field-label" style="color:var(--warning)">Reservar para Prof:</label>
                            <input type="text" id="f-prof-admin" class="input-modern" placeholder="Nome do Professor">
                        </div>
                    </div>
                    <div class="box-textos">
                        <div id="box-just" class="info-box required">
                            <label id="tit-just" class="field-label">Obrigatório: Conteúdo da Aula</label>
                            <input type="text" id="f-justificativa" class="input-modern" placeholder="Assunto da aula...">
                        </div>
                        <div class="info-box">
                            <label class="field-label">Observação (Opcional)</label>
                            <input type="text" id="f-obs" class="input-modern" placeholder="Opcional...">
                        </div>
                    </div>

            <!-- ABA: ADMIN -->

                    <div id="admin-summary" style="display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap"></div>
                    <div class="table-wrapper">
                        <table class="tabela">
                            <thead><tr><th>Professor</th><th>Data</th><th>Horário</th><th>Recurso</th><th style="text-align:center">Ação</th></tr></thead>

                        <a><ion-icon name="grid-outline"></ion-icon><span>Ver Dia</span></a>

                    <div class="indicator" id="nav-indicator"></div>
                </ul>
            </nav>
        </div>
    </div><!-- /.right-area -->

</div><!-- /#app-screen -->

<script>
// ════════════════════════════════════════════════
//  CONFIGURAÇÕES — preencha abaixo
// ════════════════════════════════════════════════
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyB_aKD4XGiAofpM2sYwJf-5M3UIVgp_Geg",
  authDomain: "sistema-yvypoty.firebaseapp.com",

  messagingSenderId: "16311833355",
  appId: "1:16311833355:web:9bd545655745428e4fc80e",
  measurementId: "G-DR0459S4S3"
};

const ADMINS = new Set(['eliveltonarandu@gmail.com', 'davivilhalva@gmail.com']);

const NOMES = {
    "angela.499954@edutec.sed.ms.gov.br":  "Prof. Bia",
    "davivilhalva@gmail.com":              "Coor. Danilo",
    "eziquiel.64128@edutec.sed.ms.gov.br": "Prof. Eziquiel",
    "gislaine.483979@edutec.sed.ms.gov.br":"Prof. Gislaine",
    "karine.457736@edutec.sed.ms.gov.br":  "Sayuri",
    "micael.509831@edutec.sed.ms.gov.br":  "Prof. Micael",
    "cilene.814757@edutec.sed.ms.gov.br":  "Prof. Cilene",
    "editon.0903@edutec.sed.ms.gov.br":    "Prof. Editon",
    "nilson.471201@edutec.sed.ms.gov.br":  "Prof. Nilson",
    "taiza.67544@edutec.sed.ms.gov.br":    "Prof. Taiza",
    "jessica.503997@edutec.sed.ms.gov.br": "Prof. Jessica",
    "sara.486835@edutec.sed.ms.gov.br":    "Prof. Sara",
    "lorraine.494103@edutec.sed.ms.gov.br":"Prof. Lorraine",
    "edmar.494105@edutec.sed.ms.gov.br":   "Prof. Edmar",
    "elivelto.035617@edutec.sed.ms.gov.br":"PCPI. Elivelto",
    "eliveltonarandu@gmail.com":           "PCPI. Elivelto"
};

const HORARIOS = ["1º Horário","2º Horário","3º Horário","4º Horário","5º Horário","6º Horário","7º Horário","8º Horário"];

// ════════════════════════════════════════════════
//  INICIALIZAÇÃO FIREBASE
// ════════════════════════════════════════════════
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

let userLogado = null;
const HOJE = new Date().toISOString().split('T')[0];

// ════════════════════════════════════════════════
//  UTILITÁRIOS — Toast, Modal, Relógio
// ════════════════════════════════════════════════
function toast(msg, type = 'info', icon = '') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = icon ? `<ion-icon name="${icon}" style="font-size:18px"></ion-icon> ${msg}` : msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function confirmar(titulo, msg) {
    return new Promise(resolve => {
        const modal = document.getElementById('modal');
        document.getElementById('modal-title').textContent = titulo;
        document.getElementById('modal-msg').textContent   = msg;
        modal.style.display = 'flex';
        const limpar = (r) => { modal.style.display = 'none'; resolve(r); };
        document.getElementById('modal-ok').onclick     = () => limpar(true);
        document.getElementById('modal-cancel').onclick = () => limpar(false);
    });
}

function nomePorEmail(email) {
    return NOMES[email] || ('Prof. ' + email.split('@')[0]);
}

function formatarData(isoDate) {
    return isoDate.split('-').reverse().join('/');
}

function atualizarRelogio() {
    const now = new Date();
    const br  = new Date(now.getTime() - now.getTimezoneOffset() * 60000 - 14400000);
    document.getElementById('local-clock').textContent =
        br.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// ════════════════════════════════════════════════
//  NAVEGAÇÃO — indicador matemático
// ════════════════════════════════════════════════
function alinharIndicador() {
    const ativo = document.querySelector('.nav-item.active');
    const ind   = document.getElementById('nav-indicator');
    if (!ativo || !ind) return;
    const ulRect  = document.getElementById('nav-ul').getBoundingClientRect();
    const liRect  = ativo.getBoundingClientRect();
    const offset  = (liRect.left - ulRect.left) + liRect.width / 2 - ind.offsetWidth / 2;
    ind.style.transform = `translateX(${offset}px)`;
}
window.addEventListener('resize', alinharIndicador);

// Delegação de eventos na navbar (evita onclick inline em cada <li>)
document.getElementById('nav-ul').addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if (!item) return;
    const aba = item.dataset.aba;

    if (aba === '__sair') { sair(); return; }

    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    alinharIndicador();
    mudarAba(aba);
});

function mudarAba(abaId) {
    document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
    const target = document.getElementById(abaId);
    if (target) target.classList.add('ativa');

    if (abaId === 'aba-minhas') carregarMinhasReservas();
    if (abaId === 'aba-geral')  { preencherDataHoje('v-data'); carregarVisaoDia(); }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function irParaAba(abaId) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('nav-indicator').style.opacity = '0';
    document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
    const t = document.getElementById(abaId);
    if (t) t.classList.add('ativa');
    if (abaId === 'aba-admin') carregarReservasAdmin();
}

function toggleTheme() {
    const dark = document.body.getAttribute('data-theme') === 'dark';
    dark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
    document.querySelector('#theme-btn span').textContent = dark ? 'Modo Escuro' : 'Modo Claro';
    document.querySelector('#theme-btn ion-icon').setAttribute('name', dark ? 'moon-outline' : 'sunny-outline');
    setTimeout(alinharIndicador, 400);
}

// ════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════
async function logar() {
    const email = document.getElementById('l-email').value.trim();
    const senha = document.getElementById('l-pass').value;
    const btn   = document.getElementById('btn-login-action');

    if (!email || !senha) { toast('Preencha e-mail e senha!', 'error', 'alert-circle-outline'); return; }

    btn.textContent = 'Entrando...';
    btn.disabled = true;
    try {
        await auth.signInWithEmailAndPassword(email, senha);
    } catch {
        toast('Credenciais inválidas. Tente novamente.', 'error', 'close-circle-outline');
        btn.textContent = 'Entrar no Sistema';
        btn.disabled = false;
    }
}

// Enter para logar
['l-email', 'l-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') logar(); });
});

auth.onAuthStateChanged(user => {
    if (user) { userLogado = user; iniciarApp(); }
    else {
        document.getElementById('section-login').style.display = 'flex';
        document.getElementById('app-screen').style.display   = 'none';
    }
});

function iniciarApp() {
    document.getElementById('section-login').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'flex';

    document.getElementById('user-display').textContent = nomePorEmail(userLogado.email);
    document.getElementById('f-data').setAttribute('min', HOJE);

    if (ADMINS.has(userLogado.email)) {
        document.getElementById('admin-extras').style.display  = 'flex';
        document.getElementById('box-admin-nome').style.display = 'block';
        document.getElementById('user-role').innerHTML = '<ion-icon name="shield-checkmark-outline"></ion-icon> Admin';
    }

    preencherDataHoje('f-data');
    setTimeout(() => { alinharIndicador(); mudarAba('aba-agendar'); }, 100);
    resetarTimerInatividade();
}

function preencherDataHoje(inputId) {
    const el = document.getElementById(inputId);
    if (el && !el.value) el.value = HOJE;
}

// ════════════════════════════════════════════════
//  HORÁRIOS — com skeleton loading
// ════════════════════════════════════════════════
function renderSkeleton(gridId) {
    const g = document.getElementById(gridId);
    g.innerHTML = HORARIOS.map(() => '<div class="slot skeleton"></div>').join('');
}

function onDataRecursoChange() {
    atualizarRegraJustificativa();
    verificarHorarios();
}

async function verificarHorarios() {
    const dt = document.getElementById('f-data').value;
    const rc = document.getElementById('f-recurso').value;
    const grid = document.getElementById('grid-horarios');

    if (!dt) return;

    // Regra: mês seguinte só depois do dia 26
    const hoje = new Date();
    const [ano, mes] = dt.split('-').map(Number);
    const mesFuturo  = ano > hoje.getFullYear() || mes > hoje.getMonth() + 1;

    if (mesFuturo && hoje.getDate() < 26) {
        toast('A agenda do próximo mês abre no dia 26!', 'error', 'lock-closed-outline');
        document.getElementById('f-data').value = '';
        grid.innerHTML = '<div style="grid-column:1/-1;color:var(--text-muted);font-size:13px;padding:10px 0">Selecione uma data válida.</div>';
        return;
    }

    renderSkeleton('grid-horarios');

    try {
        const snap = await db.collection('agendamentos')
            .where('data', '==', dt)
            .where('recurso', '==', rc)
            .get();

        const ocupados = new Set();
        snap.forEach(doc => ocupados.add(doc.data().horario));

        grid.innerHTML = '';
        HORARIOS.forEach(hr => {
            const livre = !ocupados.has(hr);
            const btn   = document.createElement('button');
            btn.className = `slot ${livre ? 'livre' : 'ocupado'}`;
            btn.innerHTML = `<span class="slot-hr">${hr}</span><span class="slot-sub">${livre ? 'Reservar' : 'Ocupado'}</span>`;
            if (livre) btn.onclick = () => salvar(dt, rc, hr);
            grid.appendChild(btn);
        });
    } catch (err) {
        toast('Erro ao buscar horários.', 'error', 'alert-outline');
        grid.innerHTML = '<div style="grid-column:1/-1;color:var(--danger);font-size:13px">Erro ao carregar. Tente novamente.</div>';
    }
}

async function salvar(dt, rc, hr) {
    const justificativa = document.getElementById('f-justificativa').value.trim();
    const observacao    = document.getElementById('f-obs').value.trim();

    if (rc.includes('STE') && !justificativa) {
        toast('Informe o conteúdo da aula para reservar a Sala STE.', 'error', 'alert-circle-outline');
        document.getElementById('f-justificativa').focus();
        return;
    }

    let nomeSalvar = nomePorEmail(userLogado.email);
    const nomeAdmin = document.getElementById('f-prof-admin').value.trim();
    if (ADMINS.has(userLogado.email) && nomeAdmin) nomeSalvar = nomeAdmin;

    const ok = await confirmar('Confirmar Reserva', `Reservar ${rc} — ${hr} em ${formatarData(dt)}?`);
    if (!ok) return;

    try {
        await db.collection('agendamentos').add({
            email_prof:   userLogado.email,
            nome_prof:    nomeSalvar,
            data:         dt,
            recurso:      rc,
            horario:      hr,
            justificativa,
            observacao,
            timestamp:    firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('Agendamento realizado com sucesso!', 'success', 'checkmark-circle-outline');
        document.getElementById('f-justificativa').value = '';
        document.getElementById('f-obs').value = '';
        verificarHorarios();
    } catch {
        toast('Erro ao salvar. Verifique sua conexão.', 'error', 'cloud-offline-outline');
    }
}

// ════════════════════════════════════════════════
//  VISÃO DO DIA
// ════════════════════════════════════════════════
async function carregarVisaoDia() {
    const dt = document.getElementById('v-data').value;
    const rc = document.getElementById('v-recurso').value;
    if (!dt) return;

    renderSkeleton('grid-visao');

    try {
        const snap = await db.collection('agendamentos')
            .where('data', '==', dt).where('recurso', '==', rc).get();

        const mapa = {};
        snap.forEach(doc => { mapa[doc.data().horario] = doc.data().nome_prof; });

        const grid = document.getElementById('grid-visao');
        grid.innerHTML = HORARIOS.map(hr => `
            <div class="slot ${mapa[hr] ? 'ocupado' : 'livre'}">
                <span class="slot-hr">${hr}</span>
                <span class="slot-sub">${mapa[hr] || 'Livre'}</span>
            </div>`).join('');
    } catch {
        toast('Erro ao carregar visão do dia.', 'error', 'alert-outline');
    }
}

// ════════════════════════════════════════════════
//  MINHAS RESERVAS
// ════════════════════════════════════════════════
async function carregarMinhasReservas() {
    const tb = document.getElementById('tabela-minhas');
    tb.innerHTML = '<tr><td colspan="4" class="empty-state">Carregando...</td></tr>';

    try {
        const snap = await db.collection('agendamentos')
            .where('email_prof', '==', userLogado.email).get();

        const reservas = [];
        snap.forEach(doc => {
            if (doc.data().data >= HOJE) reservas.push({ id: doc.id, ...doc.data() });
        });
        reservas.sort((a, b) => a.data.localeCompare(b.data) || a.horario.localeCompare(b.horario));

        if (!reservas.length) {
            tb.innerHTML = `<tr><td colspan="4"><div class="empty-state">
                <ion-icon name="bookmark-outline"></ion-icon>
                Nenhum agendamento futuro encontrado.</div></td></tr>`;
            return;
        }

        tb.innerHTML = reservas.map(d => `
            <tr>
                <td>${formatarData(d.data)}</td>
                <td>${d.horario}</td>
                <td><span class="badge-recurso">${d.recurso}</span></td>
                <td><button class="btn-action" onclick="deletar('${d.id}', false)">
                    <ion-icon name="trash-outline"></ion-icon>
                </button></td>
            </tr>`).join('');
    } catch {
        toast('Erro ao carregar suas reservas.', 'error', 'alert-outline');
    }
}

// ════════════════════════════════════════════════
//  PAINEL ADMIN
// ════════════════════════════════════════════════
async function carregarReservasAdmin() {
    const tb = document.getElementById('tabela-admin');
    tb.innerHTML = '<tr><td colspan="5" class="empty-state">Carregando...</td></tr>';

    try {
        const snap = await db.collection('agendamentos').orderBy('data').get();

        if (snap.empty) {
            tb.innerHTML = '<tr><td colspan="5"><div class="empty-state"><ion-icon name="calendar-outline"></ion-icon>Nenhuma reserva cadastrada.</div></td></tr>';
            renderAdminSummary([]);
            return;
        }

        const docs = [];
        snap.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

        renderAdminSummary(docs);

        tb.innerHTML = docs.map(d => `
            <tr>
                <td>${d.nome_prof}</td>
                <td>${formatarData(d.data)}</td>
                <td>${d.horario}</td>
                <td><span class="badge-recurso">${d.recurso}</span></td>
                <td><button class="btn-action" onclick="deletar('${d.id}', true)">
                    <ion-icon name="close-circle-outline"></ion-icon>
                </button></td>
            </tr>`).join('');
    } catch {
        toast('Erro ao carregar painel admin.', 'error', 'alert-outline');
    }
}

function renderAdminSummary(docs) {
    const contagem = {};
    docs.forEach(d => { contagem[d.recurso] = (contagem[d.recurso] || 0) + 1; });
    const el = document.getElementById('admin-summary');
    el.innerHTML = Object.entries(contagem)
        .sort((a, b) => b[1] - a[1])
        .map(([r, n]) => `
            <div style="background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-size:13px">
                <span style="font-weight:700;color:var(--accent)">${r}</span>
                <span style="color:var(--text-muted);margin-left:8px">${n} reserva${n > 1 ? 's' : ''}</span>
            </div>`).join('');
}

// ════════════════════════════════════════════════
//  DELETAR
// ════════════════════════════════════════════════
async function deletar(id, isAdmin) {
    const ok = await confirmar('Cancelar Agendamento', 'Deseja mesmo cancelar este agendamento? Esta ação não pode ser desfeita.');
    if (!ok) return;

    try {
        await db.collection('agendamentos').doc(id).delete();
        toast('Agendamento cancelado.', 'info', 'checkmark-outline');
        if (isAdmin) carregarReservasAdmin(); else carregarMinhasReservas();
        verificarHorarios();
    } catch {
        toast('Erro ao cancelar. Tente novamente.', 'error', 'alert-outline');
    }
}

// ════════════════════════════════════════════════
//  EXPORTAR CSV
// ════════════════════════════════════════════════
async function exportarCSV() {
    try {
        const snap = await db.collection('agendamentos').orderBy('data').get();
        const linhas = ['Professor;Data;Horário;Recurso;Conteúdo;Observação'];
        snap.forEach(doc => {
            const d = doc.data();
            linhas.push(`${d.nome_prof};${d.data};${d.horario};${d.recurso};${d.justificativa || ''};${d.observacao || ''}`);
        });
        const blob = new Blob(['\ufeff' + linhas.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = `Reservas_STE_${HOJE}.csv`;
        a.click();
        toast('Planilha exportada!', 'success', 'checkmark-circle-outline');
    } catch {
        toast('Erro ao exportar planilha.', 'error', 'alert-outline');
    }
}

// ════════════════════════════════════════════════
//  REGRA DE JUSTIFICATIVA
// ════════════════════════════════════════════════
function atualizarRegraJustificativa() {
    const rc = document.getElementById('f-recurso').value;
    const isSTE = rc.includes('STE');
    document.getElementById('box-just').className  = `info-box ${isSTE ? 'required' : ''}`;
    document.getElementById('tit-just').textContent = isSTE ? 'Obrigatório: Conteúdo da Aula' : 'Conteúdo (Opcional)';
}

// ════════════════════════════════════════════════
//  AUTO LOGOUT POR INATIVIDADE (10 min)
// ════════════════════════════════════════════════
let inactivityTimer;
function resetarTimerInatividade() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => {
        if (userLogado) { toast('Sessão encerrada por inatividade.', 'info'); sair(); }
    }, 10 * 60 * 1000); // 10 minutos (era 5 — ajuste conforme necessário)
}
['mousemove', 'mousedown', 'keypress', 'scroll', 'touchstart'].forEach(ev =>
    document.addEventListener(ev, resetarTimerInatividade, { passive: true })
);

async function sair() {
    await auth.signOut();
    window.location.reload();
}
</script>
